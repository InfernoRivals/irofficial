<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR | Join the Organization</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ir-red: #ff4b2b;
            --bg-dark: #0a0a0a;
            --card-bg: #151515;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at top, #1a0505 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .hub-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 { 
            font-family: 'Russo One', sans-serif; 
            color: var(--ir-red); 
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        /* --- BUTTON GRID --- */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columns */
            gap: 15px;
        }

        .role-btn {
            background: var(--card-bg);
            border: 1px solid #333;
            color: white;
            padding: 30px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Russo One', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Hover Effects */
        .role-btn:hover { 
            border-color: var(--ir-red); 
            background: #1a1a1a; 
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.2);
        }

        /* Responsive Fix for small phones */
        @media (max-width: 400px) {
            .btn-grid { grid-template-columns: 1fr; }
            .role-btn { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="hub-container">
    <h1>RECRUITMENT</h1>
    <p>Choose your department to apply</p>

    <div class="btn-grid">
        <button class="role-btn" onclick="window.location.href='playerregister.html'">
            Player
        </button>
        
        <button class="role-btn" onclick="window.location.href='coachregister.html'">
            Coach
        </button>
        
        <button class="role-btn" onclick="window.location.href='editorregister.html'">
            Editor
        </button>
        
        <button class="role-btn" onclick="window.location.href='managerregister.html'">
            Manager
        </button>
    </div>
</div>

</body>
</html>
