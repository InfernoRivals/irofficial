<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFERNO RIVALS | PRO CLOUD ROSTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ir-red: #ff4b2b; --ir-gold: #ffd700; --ir-purple: #bc13fe;
            --bg-dark: #080808; --panel-bg: #121212;
            --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark); color: white; font-family: 'Open Sans', sans-serif;
            margin: 0; padding: 0; background: radial-gradient(circle at top, #1a0505 0%, #050505 100%);
            overflow-x: hidden;
        }

        #autoscale-container { width: 1400px; margin: 0 auto; transform-origin: top left; padding-bottom: 80px; }
        .content-wrapper { width: 1340px; margin: 0 auto; }

        /* --- TITLES --- */
        .empire-card .title-edit { background: linear-gradient(to bottom, #ffd700, #fff5b7, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.3)); }
        .staff-card .title-edit { background: linear-gradient(to bottom, #ff4b2b, #ff9068); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 5px rgba(255, 75, 43, 0.3)); }
        .member-card .title-edit { background: linear-gradient(to bottom, #bc13fe, #f0abff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 5px rgba(188, 19, 254, 0.3)); }

        .section-label { font-family: 'Russo One', sans-serif; text-transform: uppercase; margin: 50px 0 30px 0; font-size: 1.8rem; letter-spacing: 3px; padding-left: 20px; border-left: 6px solid transparent; }
        .empire-label { color: var(--ir-gold); border-color: var(--ir-gold); }
        .staff-label { color: var(--ir-red); border-color: var(--ir-red); }
        .member-label { color: var(--ir-purple); border-color: var(--ir-purple); cursor: pointer; }

        .roster-grid { display: grid; gap: 20px; margin-bottom: 40px; opacity: 0; transform: translateY(40px); transition: 0.8s; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .pop-in { opacity: 1 !important; transform: translateY(0) !important; }

        .player-card { background: var(--panel-bg); border: 1px solid #222; border-radius: 15px; overflow: hidden; transition: 0.3s; height: fit-content; position: relative; }
        .card-header { padding: 20px 15px; text-align: center; cursor: pointer; }
        .card-body { display: grid; grid-template-rows: 0fr; transition: 0.5s ease-in-out; background: rgba(0,0,0,0.5); }
        .player-card.active .card-body, .member-card .card-body { grid-template-rows: 1fr; padding: 25px; border-top: 1px solid #222; }
        .card-content { overflow: hidden; display: flex; flex-direction: column; align-items: center; }

        .player-photo { width: 220px; height: 220px; border-radius: 12px; margin-bottom: 20px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); background: #111; display: block; }
        .player-photo.hidden { display: none !important; }
        
        .detail-row { width: 100%; display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
        .edit-text { background: transparent; border: none; font-family: inherit; color: white; outline: none; pointer-events: none; }
        .title-edit { font-family: 'Russo One', sans-serif; font-size: 1.4rem; text-align: center; width: 100%; font-weight: bold; }
        .sub-edit { font-size: 0.8rem; text-transform: uppercase; text-align: center; width: 100%; margin-top: 5px; font-weight: bold; letter-spacing: 2px; }
        
        .label-edit { color: #666; font-size: 0.75rem; font-weight: 700; width: 35%; text-transform: uppercase; }
        .value-edit { text-align: right; width: 60%; font-size: 1rem; color: #ddd; font-weight: 600; }

        .team-layout-wrapper { display: flex; gap: 30px; margin-top: 30px; align-items: flex-start; }
        .glass-sidebar { width: 280px; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .team-selector { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #888; padding: 12px 18px; border-radius: 10px; font-family: 'Russo One', sans-serif; cursor: pointer; transition: 0.3s; font-size: 0.85rem; }
        .active-btn { background: linear-gradient(90deg, var(--ir-purple), #8a2be2); color: white; box-shadow: 0 4px 15px rgba(188, 19, 254, 0.4); }

        /* Dev Mode UI */
        #dev-panel { display: none; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .dev-btn { width: 100%; border: none; padding: 12px; border-radius: 8px; font-family: 'Russo One', sans-serif; cursor: pointer; margin-bottom: 8px; font-size: 0.8rem; }
        .btn-gold { background: var(--ir-gold); color: black; }
        .btn-exit { background: var(--ir-red); color: white; }
        
        .add-card-btn { display: none; background: rgba(255,255,255,0.02); border: 2px dashed #333; border-radius: 15px; color: #444; height: 100px; align-items: center; justify-content: center; width: 100%; font-family: 'Russo One'; cursor: pointer; }
        .delete-card-trigger { display: none; position: absolute; top: 10px; right: 10px; background: var(--ir-red); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; z-index: 10; font-weight: bold; }
        
        /* New Toggle Controls */
        .dev-controls { display: none; flex-direction: column; gap: 5px; margin-bottom: 10px; width: 100%; }
        .toggle-img-btn { background: #333; color: #aaa; border: 1px solid #444; padding: 5px; border-radius: 5px; font-size: 10px; cursor: pointer; font-family: 'Russo One'; }
        .toggle-active { background: var(--ir-gold); color: black; border-color: white; }

        .dev-active .edit-text { pointer-events: auto; background: rgba(255,255,255,0.08); border-radius: 4px; padding: 2px 5px; }
        .dev-active .add-card-btn, .dev-active .delete-card-trigger, .dev-active .dev-controls { display: flex; }
        #ghost-input { position: fixed; top: -100px; opacity: 0; }
    </style>
</head>
<body id="main-body">

<input type="password" id="ghost-input" autocomplete="off">

<div id="autoscale-container">
    <div class="content-wrapper">
        <div class="section-label empire-label">Empire Builders</div>
        <div id="empire-grid" class="roster-grid grid-3"></div>

        <div class="section-label staff-label">Staff / Management</div>
        <div id="staff-grid" class="roster-grid grid-3"></div>

        <div class="section-label member-label" id="secret-trigger">Official Teams</div>
        <div class="team-layout-wrapper">
            <div class="glass-sidebar">
                <div id="team-buttons"></div>
                <div id="dev-panel">
                    <button class="dev-btn btn-gold" onclick="window.addNewTeam()">+ NEW TEAM</button>
                    <button class="dev-btn btn-exit" onclick="window.exitDevMode()">🔒 LOCK & SAVE</button>
                </div>
            </div>
            <div id="team-content-area" class="roster-grid grid-3"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxdWtaA-RwOsDJ5JANHEJOt9d3h57p6wI",
        authDomain: "cards-cce14.firebaseapp.com",
        projectId: "cards-cce14",
        storageBucket: "cards-cce14.firebasestorage.app",
        messagingSenderId: "725100801924",
        appId: "1:725100801924:web:f652aacdbb3049523777d1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ADMIN_KEY = "275"; 

    // --- DATA ---
    window.empireData = [{ title: "OWNER", sub: "GAME CRASHER", img: "", showImg: true, details: [{l:"NAME", v:"DEV JOSHII"}] }];
    window.staffData = [{ title: "MANAGER", sub: "OFFICIAL STAFF", img: "", showImg: true, details: [{l:"ROLE", v:"ADMIN"}] }];
    window.teamData = { 1: [{ title: "MEMBER 01", sub: "OFFICIAL PLAYER", img: "", showImg: false, details: [{l:"NAME", v:"PLAYER 1"}] }] };
    window.currentTeamId = 1;

    // --- RENDER ---
    window.renderCard = (data, type, index, teamId = null) => {
        const isMember = type === 'member';
        const showImg = data.showImg !== false; // Default to true
        return `
            <div class="player-card ${type}-card" ${!isMember ? `onclick="this.classList.toggle('active')"` : ''}>
                <button class="delete-card-trigger" onclick="event.stopPropagation(); window.deleteCard('${type}', ${index}, ${teamId})">✖</button>
                <div class="card-header">
                    <input class="edit-text title-edit" value="${data.title}" onchange="window.updateHeader('${type}', ${index}, 'title', this.value, ${teamId})">
                    <input class="edit-text sub-edit" value="${data.sub}" onchange="window.updateHeader('${type}', ${index}, 'sub', this.value, ${teamId})">
                </div>
                <div class="card-body">
                    <div class="card-content">
                        <div class="dev-controls">
                           <button class="toggle-img-btn ${showImg ? 'toggle-active' : ''}" onclick="window.toggleCardImg('${type}', ${index}, ${teamId})">
                             ${showImg ? '🖼️ IMAGE: ON' : '🖼️ IMAGE: OFF'}
                           </button>
                           <input class="edit-text value-edit" style="width:100%; text-align:center; font-size:0.7rem; display:${showImg ? 'block' : 'none'}" 
                                  placeholder="PASTE URL" value="${data.img || ''}" 
                                  onchange="window.updateImage('${type}', ${index}, this.value, ${teamId})">
                        </div>

                        <img src="${data.img || ''}" class="player-photo ${showImg ? '' : 'hidden'}" id="img-${type}-${index}-${teamId || '0'}">

                        ${data.details.map((d, i) => `
                            <div class="detail-row">
                                <input class="edit-text label-edit" value="${d.l}" onchange="window.updateData('${type}', ${index}, ${i}, 'l', this.value, ${teamId})">
                                <input class="edit-text value-edit" value="${d.v}" onchange="window.updateData('${type}', ${index}, ${i}, 'v', this.value, ${teamId})">
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
    };

    window.toggleCardImg = (t, idx, tId) => {
        const target = (t === 'member' ? window.teamData[tId][idx] : (t === 'empire' ? window.empireData[idx] : window.staffData[idx]));
        target.showImg = !target.showImg;
        t === 'member' ? window.loadTeam(tId) : window.refreshUI();
    };

    window.updateImage = (t, idx, val, tId) => {
        const target = (t === 'member' ? window.teamData[tId][idx] : (t === 'empire' ? window.empireData[idx] : window.staffData[idx]));
        target.img = val;
        document.getElementById(`img-${t}-${idx}-${tId || '0'}`).src = val;
    };

    window.refreshUI = () => {
        document.getElementById('empire-grid').innerHTML = window.empireData.map((d, i) => window.renderCard(d, 'empire', i)).join('') + `<button class="add-card-btn" onclick="window.addCard('empire')">+ ADD EMPIRE</button>`;
        document.getElementById('staff-grid').innerHTML = window.staffData.map((d, i) => window.renderCard(d, 'staff', i)).join('') + `<button class="add-card-btn" onclick="window.addCard('staff')">+ ADD STAFF</button>`;
        window.renderTeamButtons();
        document.getElementById('empire-grid').classList.add('pop-in');
        document.getElementById('staff-grid').classList.add('pop-in');
    };

    window.renderTeamButtons = () => {
        const container = document.getElementById('team-buttons');
        container.innerHTML = Object.keys(window.teamData).map(id => `
            <div class="team-selector ${id == window.currentTeamId ? 'active-btn' : ''}" onclick="window.loadTeam(${id}, this)">TEAM - ${id}</div>
        `).join('');
    };

    window.loadTeam = (id, btn) => {
        window.currentTeamId = id;
        document.querySelectorAll('.team-selector').forEach(b => b.classList.remove('active-btn'));
        if(btn) btn.classList.add('active-btn');
        const area = document.getElementById('team-content-area');
        area.innerHTML = (window.teamData[id] || []).map((d, i) => window.renderCard(d, 'member', i, id)).join('') + `<button class="add-card-btn" onclick="window.addCard('member', ${id})">+ ADD PLAYER</button>`;
        area.classList.add('pop-in');
    };

    window.loadFromCloud = async () => {
        try {
            const docSnap = await getDoc(doc(db, "roster", "mainData"));
            if (docSnap.exists()) {
                const data = docSnap.data();
                window.empireData = data.empire || window.empireData;
                window.staffData = data.staff || window.staffData;
                window.teamData = data.teams || window.teamData;
            }
            window.refreshUI(); window.loadTeam(window.currentTeamId);
        } catch(e) { window.refreshUI(); window.loadTeam(1); }
    };

    window.saveToCloud = async () => {
        try {
            await setDoc(doc(db, "roster", "mainData"), {
                empire: window.empireData, staff: window.staffData, teams: window.teamData, adminKey: ADMIN_KEY
            });
            alert("🔥 DATABASE UPDATED!");
        } catch(e) { alert("ERROR: Save Denied."); }
    };

    window.addCard = (type, teamId = null) => {
        const obj = { title: "NAME", sub: "RANK", img: "", showImg: true, details: [{l:"IGN", v:"..."}] };
        if(type === 'member') window.teamData[teamId].push(obj); else if(type === 'empire') window.empireData.push(obj); else window.staffData.push(obj);
        type === 'member' ? window.loadTeam(teamId) : window.refreshUI();
    };

    window.deleteCard = (type, index, teamId = null) => {
        if(type === 'member') window.teamData[teamId].splice(index, 1); else if(type === 'empire') window.empireData.splice(index, 1); else window.staffData.splice(index, 1);
        type === 'member' ? window.loadTeam(teamId) : window.refreshUI();
    };

    window.addNewTeam = () => {
        let newId = Object.keys(window.teamData).length + 1;
        window.teamData[newId] = [];
        window.renderTeamButtons(); window.loadTeam(newId);
    };

    window.updateHeader = (t, idx, k, v, tId) => { (t === 'member' ? window.teamData[tId][idx] : (t === 'empire' ? window.empireData[idx] : window.staffData[idx]))[k] = v; };
    window.updateData = (t, idx, lIdx, k, v, tId) => { (t === 'member' ? window.teamData[tId][idx] : (t === 'empire' ? window.empireData[idx] : window.staffData[idx])).details[lIdx][k] = v; };

    window.exitDevMode = async () => {
        const inputKey = prompt("Enter Admin Key to Sync:");
        if (inputKey === ADMIN_KEY) {
            await window.saveToCloud();
            document.getElementById('main-body').classList.remove('dev-active');
            document.getElementById('dev-panel').style.display = "none";
            window.refreshUI();
        } else if (inputKey !== null) { alert("Wrong Key!"); }
    };

    // --- STEALTH TRIGGERS ---
    let tapCount = 0;
    document.getElementById('secret-trigger').addEventListener('click', () => {
        tapCount++;
        if (tapCount === 3) { document.getElementById('ghost-input').focus(); tapCount = 0; }
        setTimeout(() => tapCount = 0, 2000);
    });

    document.getElementById('ghost-input').addEventListener('input', function() {
        if (this.value === "1234") {
            document.getElementById('main-body').classList.add('dev-active');
            document.getElementById('dev-panel').style.display = "block";
            window.refreshUI(); window.loadTeam(window.currentTeamId);
            this.value = ""; this.blur();
        }
    });

    const autoScale = () => {
        const scale = window.innerWidth / 1400;
        if (window.innerWidth < 1400) {
            document.getElementById('autoscale-container').style.transform = `scale(${scale})`;
            document.body.style.height = (document.getElementById('autoscale-container').offsetHeight * scale) + 'px';
        }
    };

    window.addEventListener('load', () => { window.loadFromCloud(); autoScale(); });
</script>
</body>
</html>
