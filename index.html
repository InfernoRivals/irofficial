<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFERNO RIVALS | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ir-red: #ff3131;
            --ir-gold: #ffd700;
            --bg-black: #050505;
            --discord: #5865F2;
            --insta: #e1306c;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-black);
            color: white;
            font-family: 'Open Sans', sans-serif;
            background: radial-gradient(circle at top, #1a0505 0%, #050505 100%);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            box-sizing: border-box;
        }

        /* --- TOP NAV (Socials) --- */
        .top-nav {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 0 0 auto;
        }

        .social-btn-top {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-family: 'Russo One';
            font-size: 0.6rem;
            color: white;
            transition: 0.3s;
        }

        .social-btn-top.insta-top:hover { border-color: var(--insta); color: var(--insta); box-shadow: 0 0 10px var(--insta); }
        .social-btn-top.discord-top:hover { border-color: var(--discord); color: var(--discord); box-shadow: 0 0 10px var(--discord); }

        /* --- LOGO --- */
        .logo-section { flex: 0 0 auto; margin-top: -10px; }
        .logo-img { width: 85px; filter: drop-shadow(0 0 10px var(--ir-red)); }

        /* --- MINI BOXES --- */
        .mini-box-wrapper {
            display: flex;
            justify-content: center;
            gap: 6px;
            width: 92%;
            flex: 0 0 auto;
        }
        .mini-box {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 6px 2px;
            text-align: center;
            cursor: pointer;
        }
        .mini-box.active { border-color: var(--ir-red); background: #1a1a1a; }
        .mini-box h3 { font-family: 'Russo One'; font-size: 0.5rem; margin: 0; color: #888; }
        .mini-box .mini-name { font-family: 'Russo One'; font-size: 0.45rem; color: white; display: block; margin-top: 2px; }

        /* --- DISPLAY AREA --- */
        #display-area {
            flex: 1;
            width: 85%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px 0;
        }

        .huge-card {
            width: 100%;
            height: 100%;
            max-height: 360px; 
            background: linear-gradient(180deg, #1a1a1a 0%, #080808 100%);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #444;
            animation: popup 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popup {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .photo-frame {
            flex: 1;
            width: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 12px 10px; text-align: center; background: #0d0d0d; }
        .huge-card.founder { border-color: var(--ir-gold); }
        .huge-card.cofounder { border-color: var(--ir-red); }
        .card-info h2 { font-family: 'Russo One'; font-size: 1.3rem; margin: 0; letter-spacing: 1px; }
        .card-info p { color: #888; text-transform: uppercase; font-size: 0.6rem; margin-top: 4px; }

        /* --- BUTTONS --- */
        .btn-container {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 85%;
            max-width: 300px;
        }
        .btn {
            padding: 10px;
            font-family: 'Russo One';
            font-size: 0.85rem;
            text-decoration: none;
            border-radius: 50px;
            text-align: center;
            text-transform: uppercase;
        }
        .btn-join { background: linear-gradient(to right, #b91d1d, #ff3131); color: white; }
        .btn-roster { background: transparent; color: white; border: 1px solid white; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="https://www.instagram.com/ir.official.esports?igsh=MWl5d2c0bjJmZnFucw==" class="social-btn-top insta-top">IG</a>
        <a href="https://youtube.com/@ir_official-esports?si=JAkSL8s9Oy3sm45w" class="social-btn-top discord-top">YT</a>
    </div>

    <div class="logo-section">
        <img src="logo.png" class="logo-img" alt="IR Logo">
    </div>

    <div class="mini-box-wrapper">
        <div class="mini-box active" onclick="showCard('dev', this)">
            <h3>FOUNDER</h3>
            <span class="mini-name">DEVRAJ RATHOD</span>
        </div>
        <div class="mini-box" onclick="showCard('aaryan', this)">
            <h3>FOUNDER</h3>
            <span class="mini-name">DEV JOSHII</span>
        </div>
        <div class="mini-box" onclick="showCard('rahul', this)">
            <h3>CO-FOUNDER</h3>
            <span class="mini-name">JENIL THAKOR</span>
        </div>
    </div>

    <div id="display-area">
        <div class="huge-card founder">
            <div class="photo-frame">
                <img src="founder2.png" alt="Dev Joshii"> 
            </div>
            <div class="card-info">
                <h2>DEVRAJ RATHOD</h2>
                <p>Organization Founder</p>
            </div>
        </div>
    </div>

    <div class="btn-container">
        <a href="application.html" class="btn btn-join">Join the Team</a>
        <a href="cards.html" class="btn btn-roster">Our Rosters</a>
    </div>

    <script>
        const cardData = {
            dev: { name: "DEVRAJ RATHOD", role: "Organization Founder", type: "founder", img: "founder2.png" },
            aaryan: { name: "DEV JOSHII", role: "Organization Founder", type: "founder", img: "founder1.png" },
            rahul: { name: "JENIL THAKOR", role: "Co-Founder / Board", type: "cofounder", img: "cofounder.png" }
        };

        function showCard(key, el) {
            const display = document.getElementById('display-area');
            const data = cardData[key];
            
            display.innerHTML = ''; 
            setTimeout(() => {
                display.innerHTML = `
                    <div class="huge-card ${data.type}">
                        <div class="photo-frame">
                            <img src="${data.img}" alt="${data.name}">
                        </div>
                        <div class="card-info">
                            <h2>${data.name}</h2>
                            <p>${data.role}</p>
                        </div>
                    </div>
                `;
            }, 10);

            document.querySelectorAll('.mini-box').forEach(box => box.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
